# Installed to: /etc/needrestart/conf.d/zz-persalink.conf
#
# Never auto-restart services after a library upgrade. On 2026-05-28, an
# unattended libgcrypt20 upgrade triggered needrestart's default auto-restart
# mode, which bounced the PM2 daemon AND the tmux server — wiping every live
# PersaLink session. List-only ('l') means needrestart reports what *would*
# need restarting but never does it itself. Combined with masked auto-updates,
# nothing on this box restarts a running service without a human in the loop.
$nrconf{restart} = 'l';
